# Terminator keybindings, merged into ~/.config/terminator/config by
# modules/40-terminator.sh as the [keybindings] section.
#
# This file is the whole section body — keep the two-space indentation,
# that's Terminator's config format. Everything else about Terminator
# (profiles, colors, layouts, fonts) is left alone deliberately: set those
# in Preferences and they'll survive re-runs of install.sh, because the
# module only ever replaces this one section.
#
# Key syntax is GTK accelerator form: <Shift>, <Alt>, <Ctrl>, <Super>.
# The full list of bindable actions is in `man terminator_config`.

  split_horiz = <Shift><Alt>Down
  split_vert = <Shift><Alt>Right
  switch_to_tab_1 = <Alt>1
  switch_to_tab_2 = <Alt>2
  switch_to_tab_3 = <Alt>3
  switch_to_tab_4 = <Alt>4
  switch_to_tab_5 = <Alt>5
  switch_to_tab_6 = <Alt>6
  switch_to_tab_7 = <Alt>7
  switch_to_tab_8 = <Alt>8
  switch_to_tab_9 = <Alt>9
  switch_to_tab_10 = <Alt>0
